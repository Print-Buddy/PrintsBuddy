<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - Print$Buddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827;
            color: #F3F4F6 !important;
            margin: 0;
            overflow-x: hidden;
        }
        header { background: linear-gradient(90deg, #0D9488, #1E3A8A); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3); }
        nav { max-width: 1400px; margin: 0 auto; padding: 1rem; display: flex; justify-content: space-between; align-items: center; position: relative; }
        nav .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FBBF24 !important;
            display: flex;
            align-items: center;
        }
        nav ul { display: flex; list-style: none; gap: 1rem; flex-direction: row; }
        nav a { color: #F3F4F6 !important; text-decoration: none; font-weight: 600; transition: color 0.3s ease; }
        nav a:hover { color: #FBBF24 !important; }
        .hamburger { display: none; flex-direction: column; cursor: pointer; position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); }
        .hamburger span { width: 25px; height: 3px; background: #F3F4F6; margin: 2px 0; transition: all 0.3s ease; }
        .nav-active { display: flex !important; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: #1E3A8A; padding: 1rem; z-index: 999; }

        main { max-width: 1400px; margin: 3rem auto; padding: 0 1rem; min-height: calc(100vh - 200px); }

        footer { background: #1F2937; color: #9CA3AF !important; text-align: center; padding: 2rem; border-top: 2px solid #0D9488; }
        footer p { margin-bottom: 0.5rem; }
        footer a { color: #FBBF24 !important; text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            nav ul { display: none; flex-direction: column; width: 100%; }
            .hamburger { display: flex; }
            .nav-active { display: flex !important; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><img src="https://i.ibb.co/NdzKLZMD/photo-2025-08-29-16-57-25.jpg" alt="Print$Buddy Logo" style="height: 40px; display: inline-block; margin-right: 10px;">Print$Buddy 🖨️</div>
            <div class="hamburger"><span></span><span></span><span></span></div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="wall-of-buddy.html">Wall of Buddy</a></li>
                <li><a href="games.html">Games</a></li>
            </ul>
        </nav>
    </header>

    <main id="game-container">
        <h1 class="text-4xl font-bold text-yellow-400 text-center mb-4">Print$Buddy Arcade</h1>
        <h2 class="text-2xl font-semibold text-cyan-400 text-center mb-8">Tic-Tac-Toe vs Advanced AI</h2>

        <div class="flex flex-col items-center justify-center">
            <div id="status-display" class="text-xl font-bold mb-6 text-white bg-gray-800 py-2 px-6 rounded-full shadow-lg border border-teal-500">Your turn (X)</div>

            <div id="board" class="grid grid-cols-3 gap-3 bg-teal-700 p-3 rounded-lg shadow-2xl">
                <!-- 9 cells -->
                <button class="cell w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 text-4xl sm:text-5xl font-bold flex items-center justify-center rounded transition-colors duration-300 hover:bg-gray-700 text-white focus:outline-none" data-index="0"></button>
                <button class="cell w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 text-4xl sm:text-5xl font-bold flex items-center justify-center rounded transition-colors duration-300 hover:bg-gray-700 text-white focus:outline-none" data-index="1"></button>
                <button class="cell w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 text-4xl sm:text-5xl font-bold flex items-center justify-center rounded transition-colors duration-300 hover:bg-gray-700 text-white focus:outline-none" data-index="2"></button>
                <button class="cell w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 text-4xl sm:text-5xl font-bold flex items-center justify-center rounded transition-colors duration-300 hover:bg-gray-700 text-white focus:outline-none" data-index="3"></button>
                <button class="cell w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 text-4xl sm:text-5xl font-bold flex items-center justify-center rounded transition-colors duration-300 hover:bg-gray-700 text-white focus:outline-none" data-index="4"></button>
                <button class="cell w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 text-4xl sm:text-5xl font-bold flex items-center justify-center rounded transition-colors duration-300 hover:bg-gray-700 text-white focus:outline-none" data-index="5"></button>
                <button class="cell w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 text-4xl sm:text-5xl font-bold flex items-center justify-center rounded transition-colors duration-300 hover:bg-gray-700 text-white focus:outline-none" data-index="6"></button>
                <button class="cell w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 text-4xl sm:text-5xl font-bold flex items-center justify-center rounded transition-colors duration-300 hover:bg-gray-700 text-white focus:outline-none" data-index="7"></button>
                <button class="cell w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 text-4xl sm:text-5xl font-bold flex items-center justify-center rounded transition-colors duration-300 hover:bg-gray-700 text-white focus:outline-none" data-index="8"></button>
            </div>

            <button id="restart-btn" class="mt-8 bg-gradient-to-r from-teal-500 to-blue-600 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-cyan-500/50 transition-all duration-300 transform hover:scale-105">
                Restart Game
            </button>
        </div>
    </main>

    <footer>
        <p> MNIT Jaipur</p>
        <p>🚚 Delivery: All Hostels</p>
        <p><a href="https://wa.me/919251028070">WhatsApp: 9251028070</a></p>
        <p>&copy; 2024 Print$Buddy. All rights reserved.</p>
    </footer>

    <script>
        const hamburger = document.querySelector('.hamburger');
        const navUl = document.querySelector('nav ul');
        hamburger.addEventListener('click', () => { navUl.classList.toggle('nav-active'); });

        // Tic-Tac-Toe Logic
        const boardElement = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const statusDisplay = document.getElementById('status-display');
        const restartBtn = document.getElementById('restart-btn');

        let board = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        const player = 'X';
        const ai = 'O';

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        function checkWin(currentBoard, testPlayer) {
            return winningConditions.some(condition => {
                return condition.every(index => currentBoard[index] === testPlayer);
            });
        }

        function isDraw(currentBoard) {
            return currentBoard.every(cell => cell !== '');
        }

        function handleCellClick(e) {
            const cell = e.target;
            const index = parseInt(cell.getAttribute('data-index'));

            if (board[index] !== '' || !gameActive) return;

            makeMove(index, player);
            if (checkWin(board, player)) {
                endGame(`You Win! 🎉`);
                triggerCelebration();
                return;
            }
            if (isDraw(board)) {
                endGame('Draw!');
                return;
            }

            statusDisplay.textContent = 'Computer thinking...';
            gameActive = false; // Prevent clicks while AI thinks

            setTimeout(() => {
                const aiMove = getBestMove();
                makeMove(aiMove, ai);

                if (checkWin(board, ai)) {
                    endGame('Computer Wins! 🤖');
                } else if (isDraw(board)) {
                    endGame('Draw!');
                } else {
                    gameActive = true;
                    statusDisplay.textContent = 'Your turn (X)';
                }
            }, 500); // Small delay for realism
        }

        function makeMove(index, currentPlayer) {
            board[index] = currentPlayer;
            cells[index].textContent = currentPlayer;
            cells[index].classList.add(currentPlayer === 'X' ? 'text-cyan-400' : 'text-yellow-400');
        }

        function endGame(message) {
            statusDisplay.textContent = message;
            gameActive = false;
        }

        function restartGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            statusDisplay.textContent = 'Your turn (X)';
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('text-cyan-400', 'text-yellow-400');
            });
            // Remove any celebration elements
            document.querySelectorAll('.celebration-emoji').forEach(el => el.remove());
        }

        // Minimax Algorithm
        function minimax(newBoard, depth, isMaximizing) {
            if (checkWin(newBoard, ai)) return 10 - depth;
            if (checkWin(newBoard, player)) return depth - 10;
            if (isDraw(newBoard)) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < newBoard.length; i++) {
                    if (newBoard[i] === '') {
                        newBoard[i] = ai;
                        let score = minimax(newBoard, depth + 1, false);
                        newBoard[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < newBoard.length; i++) {
                    if (newBoard[i] === '') {
                        newBoard[i] = player;
                        let score = minimax(newBoard, depth + 1, true);
                        newBoard[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function getBestMove() {
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < board.length; i++) {
                if (board[i] === '') {
                    board[i] = ai;
                    let score = minimax(board, 0, false);
                    board[i] = '';
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function triggerCelebration() {
            const emojis = ['🎉', '🎊', '✨', '🏆', '💯'];
            for (let i = 0; i < 50; i++) {
                const emoji = document.createElement('div');
                emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.className = 'celebration-emoji absolute text-4xl';
                emoji.style.left = Math.random() * 100 + 'vw';
                emoji.style.top = -50 + 'px';
                emoji.style.transition = `transform ${Math.random() * 2 + 1}s linear, opacity ${Math.random() * 2 + 1}s`;
                emoji.style.pointerEvents = 'none';
                document.body.appendChild(emoji);

                // Start falling animation
                setTimeout(() => {
                    emoji.style.transform = `translateY(${window.innerHeight + 100}px) rotate(${Math.random() * 360}deg)`;
                    emoji.style.opacity = '0';
                }, 50);

                // Cleanup
                setTimeout(() => emoji.remove(), 3000);
            }
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        restartBtn.addEventListener('click', restartGame);
    </script>
</body>
</html>
